<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lonely Desert Road</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #edc9af; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-family: 'Courier New', Courier, monospace; font-size: 24px; text-shadow: 2px 2px 5px #000; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui">WAKTU BERTAHAN: <span id="timer">0</span>s</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xe8b923); // Warna langit gurun
        scene.fog = new THREE.Fog(0xe8b923, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lampu yang lebih terang
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        // Lantai Pasir
        const planeGeo = new THREE.BoxGeometry(100, 1, 5000); // Jalan panjang
        const planeMat = new THREE.MeshStandardMaterial({ color: 0xc2a164 });
        const ground = new THREE.Mesh(planeGeo, planeMat);
        ground.position.y = -0.5; // Agar kaki truk pas di tanah
        scene.add(ground);

        const loader = new GLTFLoader();
        let truck = null;

        loader.load('./assets/Truckk.glb', (gltf) => {
            truck = gltf.scene;
            // Penyesuaian agar tidak terlalu besar/kecil
            truck.scale.set(0.8, 0.8, 0.8); 
            scene.add(truck);
        });

        let startTime = Date.now();
        const timerElement = document.getElementById('timer');

        function animate() {
            requestAnimationFrame(animate);

            if (truck) {
                truck.position.z -= 0.15; // Truk jalan maju
                
                // Kamera mengikuti dengan jarak ideal
                camera.position.x = truck.position.x;
                camera.position.y = truck.position.y + 4;
                camera.position.z = truck.position.z + 12;
                camera.lookAt(truck.position.x, truck.position.y + 2, truck.position.z);

                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                timerElement.innerText = elapsed;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
