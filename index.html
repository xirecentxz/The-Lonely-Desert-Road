<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Lonely Desert Road</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #e8b923; touch-action: none; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-family: 'Courier New', monospace; font-size: 20px; text-shadow: 2px 2px 5px #000; z-index: 10; pointer-events: none; }
        .controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-around; z-index: 20; width: 100%; }
        .btn { width: 80px; height: 80px; background: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; -webkit-user-select: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">WAKTU BERTAHAN: <span id="timer">0</span>s</div>
    
    <div class="controls">
        <div id="leftBtn" class="btn">KIRI</div>
        <div id="rightBtn" class="btn">KANAN</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xe8b923);
        scene.fog = new THREE.Fog(0xe8b923, 10, 80);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        // Aspal Jalan
        const road = new THREE.Mesh(
            new THREE.BoxGeometry(15, 0.1, 30000),
            new THREE.MeshStandardMaterial({ color: 0x333333 })
        );
        scene.add(road);

        // Tanah Gurun
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(1000, 30000),
            new THREE.MeshStandardMaterial({ color: 0xd2b48c })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.15;
        scene.add(ground);

        const loader = new GLTFLoader();
        let truck = null;
        let moveState = 0; 
        let driftPower = (Math.random() - 0.5) * 0.04;

        loader.load('./assets/Truckk.glb', (gltf) => {
            truck = gltf.scene;
            truck.scale.set(0.8, 0.8, 0.8);
            
            // ROTASI KUNCI: 
            // Karena sebelumnya menghadap kanan, kita putar 90 derajat ke kiri (PI/2)
            truck.rotation.y = Math.PI; 

            scene.add(truck);
        });

        const startLeft = (e) => { e.preventDefault(); moveState = -1; };
        const startRight = (e) => { e.preventDefault(); moveState = 1; };
        const stopMove = (e) => { e.preventDefault(); moveState = 0; };

        document.getElementById('leftBtn').addEventListener('touchstart', startLeft);
        document.getElementById('rightBtn').addEventListener('touchstart', startRight);
        document.getElementById('leftBtn').addEventListener('touchend', stopMove);
        document.getElementById('rightBtn').addEventListener('touchend', stopMove);
        
        document.getElementById('leftBtn').addEventListener('mousedown', startLeft);
        document.getElementById('rightBtn').addEventListener('mousedown', startRight);
        window.addEventListener('mouseup', stopMove);

        let startTime = Date.now();
        const timerElement = document.getElementById('timer');

        function animate() {
            requestAnimationFrame(animate);

            if (truck) {
                // Truk maju lurus ke sumbu Z negatif
                truck.position.z -= 0.2;

                // Efek oleng
                truck.position.x += driftPower;
                if(Math.random() > 0.985) driftPower = (Math.random() - 0.5) * 0.05;

                // Gerakan pemain
                if(moveState === -1) truck.position.x -= 0.12;
                if(moveState === 1) truck.position.x += 0.12;

                // Reset jika keluar jalur
                if(Math.abs(truck.position.x) > 7.5) {
                    alert("Game Over! Kamu bertahan " + timerElement.innerText + " detik.");
                    truck.position.x = 0;
                    startTime = Date.now();
                    driftPower = (Math.random() - 0.5) * 0.04;
                }

                // Kamera dikunci tepat di belakang truk
                camera.position.x = truck.position.x;
                camera.position.y = 4.5;
                camera.position.z = truck.position.z + 14;
                camera.lookAt(truck.position.x, 2, truck.position.z - 10);

                timerElement.innerText = Math.floor((Date.now() - startTime) / 1000);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
