<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Lonely Desert Road</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #edc9af; touch-action: none; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-family: 'Courier New', monospace; font-size: 20px; text-shadow: 2px 2px 5px #000; z-index: 10; pointer-events: none; }
        .controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-around; z-index: 20; }
        .btn { width: 80px; height: 80px; background: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; -webkit-user-select: none; }
    </style>
</head>
<body>
    <div id="ui">WAKTU BERTAHAN: <span id="timer">0</span>s</div>
    
    <div class="controls">
        <div class="btn" id="leftBtn">KIRI</div>
        <div class="btn" id="rightBtn">KANAN</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xe8b923);
        scene.fog = new THREE.Fog(0xe8b923, 10, 80);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        // Jalan yang sangat panjang
        const ground = new THREE.Mesh(
            new THREE.BoxGeometry(20, 1, 10000),
            new THREE.MeshStandardMaterial({ color: 0x444444 }) // Warna aspal gelap
        );
        ground.position.y = -0.5;
        scene.add(ground);

        const loader = new GLTFLoader();
        let truck = null;
        let moveState = 0; // -1: kiri, 1: kanan, 0: diam
        let driftDir = (Math.random() - 0.5) * 0.02; // Logika Oleng

        loader.load('./assets/Truckk.glb', (gltf) => {
            truck = gltf.scene;
            truck.scale.set(0.8, 0.8, 0.8);
            truck.rotation.y = Math.PI; // Putar balik jika menghadap kamera
            scene.add(truck);
        });

        // Kontrol Tombol HP
        document.getElementById('leftBtn').ontouchstart = () => moveState = -1;
        document.getElementById('rightBtn').ontouchstart = () => moveState = 1;
        document.getElementById('leftBtn').ontouchend = () => moveState = 0;
        document.getElementById('rightBtn').ontouchend = () => moveState = 0;

        let startTime = Date.now();
        const timerElement = document.getElementById('timer');

        function animate() {
            requestAnimationFrame(animate);

            if (truck) {
                // Maju otomatis
                truck.position.z -= 0.2;

                // Logika Oleng Acak (Semakin lama semakin parah)
                truck.position.x += driftDir;
                if(Math.random() > 0.98) driftDir = (Math.random() - 0.5) * 0.05;

                // Input Pemain
                if(moveState === -1) truck.position.x -= 0.08;
                if(moveState === 1) truck.position.x += 0.08;

                // Cek Keluar Jalan (Gagal)
                if(Math.abs(truck.position.x) > 8) {
                    alert("Truk Terguling! Kamu bertahan: " + timerElement.innerText + " detik.");
                    truck.position.x = 0;
                    startTime = Date.now();
                }

                // Kamera di belakang (Bawah ke Atas)
                camera.position.set(truck.position.x, 4, truck.position.z + 12);
                camera.lookAt(truck.position.x, 2, truck.position.z - 5);

                timerElement.innerText = Math.floor((Date.now() - startTime) / 1000);
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
