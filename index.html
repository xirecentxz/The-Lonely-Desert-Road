<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lonely Desert Road</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #edc9af; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-family: sans-serif; font-size: 20px; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>
    <div id="ui">Waktu Bertahan: <span id="timer">0</span>s</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. Setup Dasar
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xedc9af); // Warna pasir
        scene.fog = new THREE.Fog(0xedc9af, 10, 50); // Kabut agar gurun terasa luas

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 7); // Posisi kamera di belakang truk

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Pencahayaan
        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(10, 20, 10);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // 3. Lantai Gurun (Plane)
        const planeGeo = new THREE.PlaneGeometry(1000, 1000);
        const planeMat = new THREE.MeshStandardMaterial({ color: 0xd2b48c });
        const ground = new THREE.Mesh(planeGeo, planeMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // 4. Load Truk (Asetmu!)
        const loader = new GLTFLoader();
        let truck = null;

        loader.load('./assets/Truckk.glb', (gltf) => {
            truck = gltf.scene;
            scene.add(truck);
            console.log("Truk berhasil dimuat!");
        }, undefined, (error) => {
            console.error("Gagal memuat truk:", error);
        });

        // 5. Logika Timer
        let startTime = Date.now();
        const timerElement = document.getElementById('timer');

        // 6. Animasi & Gerakan
        function animate() {
            requestAnimationFrame(animate);

            if (truck) {
                // Truk maju otomatis
                truck.position.z -= 0.1;
                
                // Kamera mengikuti truk
                camera.position.z = truck.position.z + 7;
                camera.lookAt(truck.position);

                // Update Timer
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                timerElement.innerText = elapsed;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
